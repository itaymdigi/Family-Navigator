<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: deep navy rounded rect -->
  <rect width="512" height="512" rx="110" ry="110" fill="#1B3D72"/>

  <!-- Subtle gradient overlay for depth -->
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="38%" r="52%">
      <stop offset="0%" stop-color="#2A5298" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1B3D72" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="needleShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background glow -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bgGlow)"/>

  <!-- Outer compass ring: subtle white low-opacity stroke -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.18"/>

  <!-- Middle tick ring -->
  <circle cx="256" cy="256" r="155" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.10"/>

  <!-- Cardinal tick marks (N/S/E/W) -->
  <!-- North tick -->
  <line x1="256" y1="76" x2="256" y2="100" stroke="#ffffff" stroke-width="3" stroke-opacity="0.5" stroke-linecap="round"/>
  <!-- South tick -->
  <line x1="256" y1="412" x2="256" y2="436" stroke="#ffffff" stroke-width="3" stroke-opacity="0.3" stroke-linecap="round"/>
  <!-- East tick -->
  <line x1="412" y1="256" x2="436" y2="256" stroke="#ffffff" stroke-width="3" stroke-opacity="0.3" stroke-linecap="round"/>
  <!-- West tick -->
  <line x1="76" y1="256" x2="100" y2="256" stroke="#ffffff" stroke-width="3" stroke-opacity="0.3" stroke-linecap="round"/>

  <!-- Intercardinal tick marks (NE/SE/SW/NW) at 45deg, smaller -->
  <line x1="383.4" y1="128.6" x2="366.7" y2="145.3" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.15" stroke-linecap="round"/>
  <line x1="383.4" y1="383.4" x2="366.7" y2="366.7" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.15" stroke-linecap="round"/>
  <line x1="128.6" y1="383.4" x2="145.3" y2="366.7" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.15" stroke-linecap="round"/>
  <line x1="128.6" y1="128.6" x2="145.3" y2="145.3" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.15" stroke-linecap="round"/>

  <!-- "N" label above north needle -->
  <text
    x="256"
    y="131"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="36"
    font-weight="700"
    fill="#FF6B6B"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="2"
    opacity="0.95"
  >N</text>

  <!-- Compass needle group with shadow -->
  <g filter="url(#needleShadow)">
    <!-- North needle: coral #FF6B6B, pointing up -->
    <!-- Diamond shape: tip at top (256,152), wide at center (256,256), side points -->
    <polygon
      points="256,152 236,256 256,232 276,256"
      fill="#FF6B6B"
    />

    <!-- South needle: white at 30% opacity, pointing down -->
    <polygon
      points="256,360 236,256 256,280 276,256"
      fill="#ffffff"
      fill-opacity="0.30"
    />

    <!-- East needle: white at 30% opacity, pointing right -->
    <polygon
      points="360,256 256,236 280,256 256,276"
      fill="#ffffff"
      fill-opacity="0.30"
    />

    <!-- West needle: white at 30% opacity, pointing left -->
    <polygon
      points="152,256 256,236 232,256 256,276"
      fill="#ffffff"
      fill-opacity="0.30"
    />
  </g>

  <!-- Center glow -->
  <circle cx="256" cy="256" r="34" fill="url(#centerGlow)"/>

  <!-- White outer center circle -->
  <circle cx="256" cy="256" r="26" fill="#ffffff" opacity="0.97"/>

  <!-- Inner navy dot -->
  <circle cx="256" cy="256" r="12" fill="#1B3D72"/>

  <!-- Tiny center highlight -->
  <circle cx="252" cy="252" r="4" fill="#ffffff" opacity="0.4"/>
</svg>
